<!DOCTYPE html>
<html>

<head>

    <title>Resume Data</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        .resume-box{
            background: #f8f8f8;
            padding: 20px;
            border-radius: 10px;
            max-height: 600px;
            overflow-y: scroll;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        mark{
            background: yellow;
            padding: 2px;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Extracted Resume Text</h1>

    <div class="resume-box">

        {{ resume_text | safe }}

    </div>

</div>

</body>

</html>
